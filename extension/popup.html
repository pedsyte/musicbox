<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Login Overlay -->
  <div id="login-overlay" class="login-overlay hidden">
    <div class="login-logo"><img src="icons/icon48.png" alt="MusicBox" width="48" height="48"></div>
    <div class="login-title">MusicBox</div>
    <div class="login-subtitle">Войди для доступа к избранному и плейлистам</div>
    <div class="login-form">
      <input type="text" id="login-username" placeholder="Логин" autocomplete="username">
      <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password">
      <div id="login-error"></div>
      <div class="login-actions">
        <button id="btn-do-login" class="btn-primary">Войти</button>
        <button id="btn-guest" class="btn-ghost">Слушать без входа</button>
        <button id="btn-cancel-login" class="btn-link">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Playlist View (overlay) -->
  <div id="playlist-view" class="playlist-view hidden">
    <div class="playlist-view-header">
      <button id="btn-back-from-playlist" class="btn-icon">←</button>
      <div class="playlist-view-info">
        <div id="pv-name" class="pv-name"></div>
        <div id="pv-count" class="pv-count"></div>
      </div>
      <button id="btn-play-playlist" class="btn-small">▶ Играть</button>
    </div>
    <div id="playlist-tracks" class="track-list"></div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="logo" id="logo-link" title="Открыть MusicBox на сайте">
      <img src="icons/icon16.png" alt="" width="16" height="16" class="logo-icon-img">
      <span>MusicBox</span>
    </div>
    <div id="user-area"></div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 Поиск треков...">
  </div>

  <!-- Tabs -->
  <div class="tabs" id="main-tabs">
    <div class="tab active" data-tab="all">Все</div>
    <div class="tab" data-tab="popular">🔥 Топ</div>
    <div class="tab" data-tab="genres">🎭</div>
    <div class="tab" data-tab="playlists">📋</div>
    <div class="tab" data-tab="favorites" id="tab-favorites" style="display:none">♥</div>
  </div>

  <!-- Sort bar (hidden on playlists) -->
  <div id="sort-bar" class="sort-bar">
    <select id="sort-select">
      <option value="newest">Новые</option>
      <option value="oldest">Старые</option>
      <option value="popular">Популярные</option>
      <option value="title">По названию</option>
      <option value="artist">По автору</option>
      <option value="duration">По длительности</option>
    </select>
    <button id="btn-genre-filter" class="btn-filter" title="Фильтр жанров">🎭 Фильтр</button>
  </div>

  <!-- Genre chips (hidden by default) -->
  <div id="genre-chips" class="genre-chips hidden"></div>

  <!-- Genre filter panel (include/exclude) -->
  <div id="genre-filter-panel" class="genre-filter-panel hidden">
    <div class="gf-header">
      <span class="gf-title">Фильтр жанров</span>
      <button id="btn-close-gf" class="btn-icon">✕</button>
    </div>
    <div class="gf-hint">Клик = включить, Shift+клик = исключить</div>
    <div id="gf-chips" class="gf-chips"></div>
    <div class="gf-actions">
      <button id="btn-gf-reset" class="btn-ghost-sm">Сброс</button>
      <button id="btn-gf-apply" class="btn-apply-sm">Применить</button>
    </div>
  </div>

  <!-- Content area -->
  <div id="content-area" class="content-area">
    <!-- track-list for tracks tabs -->
    <div id="track-list" class="track-list">
      <div class="empty">Загрузка...</div>
    </div>
    <!-- playlist-list for playlists tab -->
    <div id="playlist-list" class="playlist-grid hidden"></div>
  </div>

  <!-- Player -->
  <div id="player" class="player hidden">
    <div class="player-main">
      <div id="player-cover"></div>
      <div class="player-info">
        <div id="player-title"></div>
        <div id="player-artist"></div>
      </div>
      <div class="player-controls">
        <button id="btn-prev" title="Назад">⏮</button>
        <button id="btn-play" title="Играть">▶</button>
        <button id="btn-next" title="Далее">⏭</button>
      </div>
    </div>
    <div class="player-progress">
      <span id="time-current" class="time">0:00</span>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <span id="time-total" class="time">0:00</span>
    </div>
    <div class="player-bottom">
      <div class="player-toggles">
        <button id="btn-shuffle" title="Перемешать">🔀</button>
        <button id="btn-radio" title="Радио — авто-следующий">📻</button>
      </div>
      <div class="volume-control">
        <span class="volume-icon">🔊</span>
        <input type="range" id="volume-slider" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
